<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Prevention / Management Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-container">
    <h1 class="page-title">Risk Prevention / Management Dashboard</h1>

    <nav class="tabs-wrapper">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="project-overview" role="tab" aria-selected="true">Project Overview</button>
        <button class="tab" data-tab="product-management" role="tab" aria-selected="false">Product Management</button>
        <button class="tab" data-tab="design" role="tab" aria-selected="false">Design</button>
        <button class="tab" data-tab="development" role="tab" aria-selected="false">Development</button>
      </div>
      <div class="tabs-fade-right" aria-hidden="true">&#8250;</div>
    </nav>

    <div class="tab-content-wrapper">
      <div id="tab-content" class="tab-content">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    (function () {
      const from = new URLSearchParams(window.location.search).get('from');
      if (from !== 'vicki') return;

      const btn = document.createElement('a');
      btn.href = 'https://vigneshdesignspace.framer.website/#case-study';
      btn.textContent = '← Back to Vicki\'s Portfolio';
      btn.id = 'back-to-portfolio';

      Object.assign(btn.style, {
        position: 'fixed',
        top: '16px',
        left: '16px',
        zIndex: '9999',
        padding: '7px 14px',
        fontSize: '13px',
        fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, sans-serif',
        fontWeight: '500',
        color: '#e6e6e6',
        background: 'rgba(255,255,255,0.06)',
        border: '1px solid rgba(255,255,255,0.12)',
        borderRadius: '8px',
        textDecoration: 'none',
        backdropFilter: 'blur(8px)',
        WebkitBackdropFilter: 'blur(8px)',
        transition: 'background 0.2s ease, border-color 0.2s ease',
        whiteSpace: 'nowrap'
      });

      btn.addEventListener('mouseenter', () => {
        btn.style.background = 'rgba(255,255,255,0.11)';
        btn.style.borderColor = 'rgba(255,255,255,0.22)';
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.background = 'rgba(255,255,255,0.06)';
        btn.style.borderColor = 'rgba(255,255,255,0.12)';
      });

      document.body.appendChild(btn);
    })();
  </script>
</body>
</html>
